global:
  scrape_interval: 15s       # 每 15 秒采集一次

scrape_configs:
  - job_name: 'plango-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
        - 'host.docker.internal:8081'   # plan-auth
        - 'host.docker.internal:8082'   # plan-user
        - 'host.docker.internal:8083'   # plan-task
        - 'host.docker.internal:8084'   # plan-notification
        - 'host.docker.internal:8085'   # plan-agent-bridge