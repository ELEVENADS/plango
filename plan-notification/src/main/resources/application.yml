server:
  port: 8084

spring:
  application:
    name: plan-notification
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
#        namespace: dev
        group: DEFAULT_GROUP
  rabbitmq:
    host: localhost
    port: 5672      # 根据你的实际端口调整
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: manual
  graphql:
    websocket:
      path:

# WebSocket 配置（自定义配置）
app:
  websocket:
    endpoint: /ws                      # 与 WebSocketConfig 中 registerStompEndpoints 一致
    allowed-origins: "*"               # 开发阶段允许所有跨域
    # 点对点通知前缀（对应 enableSimpleBroker 中的 /user）
    user-destination-prefix: /user
    # 广播前缀
    topic-prefix: /topic


