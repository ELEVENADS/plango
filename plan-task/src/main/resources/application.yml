server:
  port: 8083                     # 本服务监听端口

spring:
  application:
    name: plan-task              # 服务名称，会注册到 Nacos

  # ---------- Nacos 服务注册 ----------
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848   # Nacos 地址
        # namespace: dev              # 如需使用 dev 命名空间，填对应的 UUID
        group: DEFAULT_GROUP          # 服务分组

  # ---------- MySQL 数据源 ----------
  datasource:
    url: jdbc:mysql://localhost:3307/plango_task?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ---------- RabbitMQ 消息队列 ----------
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # ---------- Redis 缓存 ----------
  redis:
    host: localhost
    port: 6379

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true   # 数据库下划线字段自动映射为驼峰
  global-config:
    db-config:
      id-type: auto                      # 主键自增
      logic-delete-field: deleted        # 逻辑删除字段名
      logic-delete-value: 1              # 已删除值
      logic-not-delete-value: 0          # 未删除值

# ==================== Actuator 监控 ====================
management:
  endpoints:
    web:
      exposure:
        include: "*"        # 暴露所有端点（开发环境可全开，生产请按需限制）